name: Build macOS App

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Install Python 3.13
        run: uv python install 3.13

      - name: Install system dependencies
        run: brew install portaudio mbedtls@2

      - name: Install dependencies
        run: |
          # mbedtls@2 is keg-only — set paths so python-mbedtls can compile
          export CFLAGS="-I$(brew --prefix mbedtls@2)/include"
          export LDFLAGS="-L$(brew --prefix mbedtls@2)/lib"
          uv sync

      - name: Build .app with PyInstaller
        run: uv run pyinstaller hue_visualizer_macos.spec --clean

      - name: Verify build output
        run: |
          if [ ! -d "dist/HueVisualizer.app" ]; then
            echo "Build failed — HueVisualizer.app not found"
            exit 1
          fi
          echo "Build OK: $(du -sh dist/HueVisualizer.app | cut -f1)"

      - name: Create DMG
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          mkdir -p dmg_contents
          cp -R dist/HueVisualizer.app dmg_contents/
          ln -s /Applications dmg_contents/Applications

          hdiutil create -volname "Hue Visualizer" \
            -srcfolder dmg_contents \
            -ov -format UDZO \
            "HueVisualizer-${TAG_NAME}-macos-arm64.dmg"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        env:
          TAG_NAME: ${{ github.ref_name }}
        with:
          files: HueVisualizer-${{ github.ref_name }}-macos-arm64.dmg
          generate_release_notes: true
